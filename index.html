<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>某科学的书生学院</title>
        <link rel="stylesheet" href="style.css">
    <script src="js/Skills.js"></script>
    <script src="js/Characters.js"></script>
    <script src="js/Roles.js"></script>
    <script src="js/BattleState.js"></script>
    <script src="js/SkillSystem.js"></script>
</head>
<body>
<div class="container">
    <div id="pageTitle" class="page active">
        <h1>某科学的书生学院</h1>
        <div class="sub">回合制策略对决</div>
        <button class="btn-main" onclick="showPage('pageSelectChar')">开始游戏</button>
    </div>

    <div id="pageSelectChar" class="page">
        <h2>选择出战角色与站位</h2>
        <p style="color:#aaa;">先点空格标记位置，或先点角色再点空格填充</p>
        <div class="char-slots" id="charSlots"></div>
        <div class="char-roster" id="charRoster"></div>
        <div class="control-buttons">
            <button class="btn-main" onclick="startLevelSelect()">确认出战</button>
            <button class="btn-main" style="background:#555;" onclick="showPage('pageTitle')">返回</button>
        </div>
    </div>

    <div id="pageLevel" class="page">
        <h2>选择关卡</h2>
        <div class="level-card" onclick="startBattle(0)">
            <h3>关卡0 · 测试场</h3>
            <div class="enemy-preview">
                敌方配置：纸糊稻草人×1 铁皮稻草人×1 标准稻草人×1
            </div>
        </div>
        <div class="level-card" onclick="startBattle(1)" style="margin-top:12px;">
            <h3>第一关</h3>
            <div class="enemy-preview">
                敌方配置：持盾警察×1 持棍警察×1 持枪警察×1
            </div>
        </div>
        <div class="level-card" onclick="showPage('pageSelectEnemy'); initEnemySelection();" style="margin-top:12px; border-color:#f9ca24;">
            <h3 style="color:#f9ca24;">🎯 自选敌人测试</h3>
            <div class="enemy-preview">
                自由搭配稻草人阵容，测试技能效果
            </div>
        </div>
        <button class="btn-main" style="background:#555; margin-top:15px;" onclick="showPage('pageSelectChar')">返回</button>
    </div>
    <div id="pageSelectEnemy" class="page">
        <h2>自选敌人 — 选择敌方阵容</h2>
        <p style="color:#aaa;">点击空格选敌，点击已选角色移除</p>
        <div class="char-slots" id="enemySlots"></div>
        <div class="char-roster" id="enemyRoster"></div>
        <div class="control-buttons">
            <button class="btn-main" onclick="startCustomBattle()">⚔️ 开始战斗</button>
            <button class="btn-main" style="background:#555;" onclick="showPage('pageLevel')">返回</button>
        </div>
    </div>
    <div id="pageBattle" class="page">
        <div class="battle-header">
            <h2>⚔️ 战斗</h2>
            <div class="win-condition">🏆 胜利条件：击败敌方全部角色</div>
            <div class="turn-info" id="turnDisplay">第 1 回合</div>
        </div>
        <div class="arena">
            <div class="all-characters" id="allChars"></div>
        </div>
        <div class="bottom-panel">
            <div class="skill-detail" id="skillDetail"></div>
            <div id="actionContent">等待开始...</div>
            <div class="log" id="logPanel"><p>战斗开始！</p></div>
            <button class="next-btn" id="nextRoundBtn" style="display:none;">▶ 开始回合</button>
        </div>
        <!-- Buff详情弹窗 -->
        <div id="buffPopupOverlay" class="buff-popup-overlay" style="display:none;" onclick="closeBuffPopup()">
            <div class="buff-popup" onclick="event.stopPropagation()">
                <div class="buff-popup-header">
                    <span id="buffPopupTitle">Buff 详情</span>
                    <span class="buff-popup-close" onclick="closeBuffPopup()">✕</span>
                </div>
                <div id="buffPopupBody" class="buff-popup-body"></div>
            </div>
        </div>
    </div>    
    <div id="pageResult" class="page">
        <h2 style="color:#f9ca24;">📊 战斗结算</h2>
        <div id="resultContent" style="width:100%;"></div>
        <div class="control-buttons" style="margin-top:15px;">
            <button class="btn-main" onclick="backToTitle()">返回主界面</button>
            <button class="btn-main" onclick="restartBattle()" style="background:#3498db;">🔄 再来一局</button>
        </div>
    </div>
</div>

<script>
    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    // ==================== 选角色界面 ====================
    const AVAILABLE_CHARS = ['模板一', '鲁盼旋'];
    let selectedSlots = [];
    let pendingSlotIndex = -1;  // 先点空格，等待选角色
    let pendingRole = null;     // 先点角色，等待点空格填充

    function initCharSelection() {
        selectedSlots = [null, null, null];
        pendingSlotIndex = -1;
        pendingRole = null;
        renderCharSlots();
        renderRoster();
    }

    // 点击上方空格
    function clickSlot(index) {
        if (selectedSlots[index] !== null) {
            // 已有人 → 移除
            selectedSlots[index] = null;
            pendingSlotIndex = -1;
            pendingRole = null;
        } else if (pendingRole !== null) {
            // 先点了角色 → 填入空格，清除待选状态
            selectedSlots[index] = pendingRole;
            pendingRole = null;
            pendingSlotIndex = -1;
        } else {
            // 空格 + 无待选角色 → 标记为待填充
            pendingSlotIndex = index;
        }
        renderCharSlots();
        renderRoster();
    }

    // 点击下方角色栏
    function selectRosterChar(roleName) {
        if (pendingSlotIndex !== -1) {
            // 先点了空格 → 填入该空格，清除待选
            selectedSlots[pendingSlotIndex] = roleName;
            pendingSlotIndex = -1;
        } else {
            // 没点空格 → 切换待选角色（再点一次取消）
            if (pendingRole === roleName) {
                pendingRole = null;
            } else {
                pendingRole = roleName;
            }
        }
        renderCharSlots();
        renderRoster();
    }

    function renderCharSlots() {
        const container = document.getElementById('charSlots');
        container.innerHTML = '';
        selectedSlots.forEach((role, idx) => {
            const div = document.createElement('div');
            div.className = 'char-slot';
            if (role === null) {
                const isPendingSlot = (idx === pendingSlotIndex);
                const hasPendingRole = (pendingRole !== null);
                div.style.borderColor = (isPendingSlot || hasPendingRole) ? '#f9ca24' : '#555';
                if (isPendingSlot || hasPendingRole) div.style.boxShadow = '0 0 10px #f9ca24';
                const desc = hasPendingRole ? `准备填充：${pendingRole}` : (isPendingSlot ? '点击选人' : '点击空格选人');
                div.innerHTML = `<div class="name">空位</div><div class="desc">${desc}</div>`;
            } else {
                div.style.borderColor = '#2ecc71';
                div.innerHTML = `<div class="name">${role}</div><div class="desc">站位${idx+1}</div>`;
            }
            div.onclick = () => clickSlot(idx);
            container.appendChild(div);
        });
    }

    function renderRoster() {
        const container = document.getElementById('charRoster');
        container.innerHTML = '';
        AVAILABLE_CHARS.forEach(roleName => {
            const div = document.createElement('div');
            div.className = 'roster-card';
            const count = selectedSlots.filter(r => r === roleName).length;
            const isPending = (pendingRole === roleName);
            if (isPending) {
                div.style.borderColor = '#f9ca24';
                div.style.boxShadow = '0 0 10px #f9ca24';
            }
            div.innerHTML = `
                <div class="name">${isPending ? '⬆ ' : ''}${roleName}</div>
                <div class="desc">${isPending ? '请点击上方空格上阵' : (count > 0 ? `已上场×${count}` : '点击查看')}</div>
            `;
            div.onclick = () => selectRosterChar(roleName);
            container.appendChild(div);
        });
    }

    function startLevelSelect() {
        const count = selectedSlots.filter(r => r !== null).length;
        if (count === 0) { alert('至少选择一个角色出战！'); return; }
        showPage('pageLevel');
    }

    // ==================== 战斗状态实例 ====================
    let battleState = new BattleState();
    function repositionAll() { battleState.repositionAll(); }

    const allCharsDiv = document.getElementById('allChars');
    const actionContent = document.getElementById('actionContent');
    const turnDisplay = document.getElementById('turnDisplay');
    const logPanel = document.getElementById('logPanel');
    const nextRoundBtn = document.getElementById('nextRoundBtn');
    const skillDetailDiv = document.getElementById('skillDetail');

    let battleLog = [];

    function log(msg) {
        const p = document.createElement('p');
        p.textContent = msg;
        logPanel.appendChild(p);
        logPanel.scrollTop = logPanel.scrollHeight;
        battleLog.push(msg);
    }

    // ==================== 渲染与技能查看 ====================
    function renderCharacters() {
        allCharsDiv.innerHTML = '';
        const alive = battleState.allCharacters.filter(c => c.alive).sort((a,b) => {
            if (a.team !== b.team) return a.team === 'player' ? -1 : 1;
            return a.order - b.order;
        });
        alive.forEach(char => {
            const card = document.createElement('div');
            card.className = 'character-card ' + (char.team === 'player' ? 'player-card' : 'enemy-card');
            if (char === battleState.currentActor) card.classList.add('current');
            card.dataset.characterId = char.id;
            card.dataset.team = char.team;

            // 实时总防御 + buff 竖排
            let totalDef = char.getTotalDef();
            let buffTags = [];
            let buffDetailItems = [];
            const buffTypeConfig = {
                'def':  { icon: '🛡️', color: '#4fc3f7', label: '防御变动' },
                'e':    { icon: '😈',  color: '#ab47bc', label: '恶' },
                'rage': { icon: '💢',  color: '#ff7043', label: '愤怒' },
                'burn': { icon: '🔥',  color: '#ff5252', label: '燃烧' }
            };
            char.buffs.forEach(buff => {
                const cfg = buffTypeConfig[buff.type] || { icon: '❓', color: '#aaa', label: buff.type };
                let shortText = '';
                let detailTitle = '';
                let detailDesc = '';
                if (buff.type === 'def') {
                    const sign = buff.value > 0 ? '+' : '';
                    shortText = `${cfg.icon}${sign}${buff.value}`;
                    detailTitle = `${cfg.icon} 【防御临时变动】${sign}${buff.value}`;
                    detailDesc = `持续至下一次受击`;
                } else if (buff.type === 'e') {
                    shortText = `${cfg.icon}×${buff.stack}`;
                    detailTitle = `${cfg.icon} 【恶】${buff.stack}层`;
                    detailDesc = `每层使鲁盼旋对该目标无视50防御`;
                } else if (buff.type === 'rage') {
                    shortText = `${cfg.icon}×${buff.stack}`;
                    detailTitle = `${cfg.icon} 【愤怒】${buff.stack}层（上限5）`;
                    detailDesc = `每2层使技能伤害+50，每2层使防御-50`;
                } else if (buff.type === 'burn') {
                    shortText = `${cfg.icon}Lv${buff.level}×${buff.stack}`;
                    detailTitle = `${cfg.icon} 【燃烧】Lv${buff.level} × ${buff.stack}层`;
                    detailDesc = `回合末造成 ${buff.level}×50 = ${buff.level * 50} 真实伤害，层数-1`;
                }
                buffTags.push(`<span class="buff-tag" style="color:${cfg.color}">${shortText}</span>`);
                buffDetailItems.push({ icon: cfg.icon, color: cfg.color, title: detailTitle, desc: detailDesc });
            });
            const buffHtml = buffTags.join('');

            card.innerHTML = `
                <span class="position-mark">位置${char.position}</span>
                <div class="name">${char.name}</div>
                <div class="bar-container"><div class="hp-bar" style="width:${(char.hp/char.maxHp)*100}%"></div></div>
                <div style="font-size:0.7em;">HP ${char.hp}/${char.maxHp}</div>
                <div class="bar-container"><div class="sp-bar" style="width:${(char.sp/char.maxSP)*100}%"></div></div>
                <div style="font-size:0.7em;">算力 ${char.sp}/${char.maxSP}</div>
                <div class="stats">防${totalDef}${totalDef !== char.def ? `(基础${char.def})` : ''} 速${char.speed}</div>
                ${buffDetailItems.length > 0 ? `<div class="buff-indicator" data-buff-char="${char.id}">${buffHtml}</div>` : ''}
            `;

            // Buff点击 → 弹出详情
            const buffEl = card.querySelector('.buff-indicator');
            if (buffEl) {
                buffEl.addEventListener('click', function(e) {
                    e.stopPropagation();
                    showBuffPopup(char, buffDetailItems);
                });
            }

            card.addEventListener('click', function(e) {
                const charId = parseInt(this.dataset.characterId);
                const c = battleState.findCharacterById(charId);
                if (!c || !c.alive) return;

                if (battleState.selectedSkill && c.team === 'enemy' && this.classList.contains('selectable')) {
                    if (battleState.currentSelectedTargets.has(c)) {
                        battleState.currentSelectedTargets.delete(c);
                        this.style.borderColor = '#e74c3c';
                    } else {
                        battleState.currentSelectedTargets.add(c);
                        this.style.borderColor = '#f9ca24';
                    }
                    return;
                }
                showSkillInfo(c);
            });

            allCharsDiv.appendChild(card);
            char.cardElement = card;
        });
    }

    function showBuffPopup(char, buffDetailItems) {
        const overlay = document.getElementById('buffPopupOverlay');
        const title = document.getElementById('buffPopupTitle');
        const body = document.getElementById('buffPopupBody');
        title.textContent = `${char.name} — Buff 详情`;
        if (buffDetailItems.length === 0) {
            body.innerHTML = `<div class="buff-popup-empty">当前无 Buff 效果</div>`;
        } else {
            body.innerHTML = buffDetailItems.map(item => `
                <div class="buff-popup-item" style="border-left-color:${item.color}">
                    <div class="buff-popup-icon">${item.icon}</div>
                    <div class="buff-popup-text">
                        <div class="title" style="color:${item.color}">${item.title}</div>
                        <div class="desc">${item.desc}</div>
                    </div>
                </div>
            `).join('');
        }
        overlay.style.display = 'flex';
    }

    function closeBuffPopup() {
        document.getElementById('buffPopupOverlay').style.display = 'none';
    }

    function showSkillInfo(char) {
        const skills = char.skills;
        if (!skills || skills.length === 0) return;
        let info = `<strong>${char.name}</strong> 技能组：<br>`;
        skills.forEach((skill, i) => {
            const formula = `${skill.baseDamage} + ${skill.bonusDamage} × 硬币(${skill.coinCount})`;
            info += `【${skill.name}】消耗${skill.spCost}算力，距离${skill.attackRange}，伤害${formula}`;
            if (skill.buff) {
                info += `，效果：防御${skill.buff.value>0?'+':''}${skill.buff.value}`;
            }
            if (skill.special) {
                if (skill.special.type === 'burn') info += `，命中：施加${skill.special.stacks}层【燃烧】`;
                else if (skill.special.type === 'ignoreDef') info += `，特效：无视${skill.special.value}防御`;
                else if (skill.special.type === 'evilDrain') info += `，特效：目标每层【恶】+${skill.special.bonus}伤害，清零【恶】`;
            }
            info += `<br>`;
        });
        // 追加被动描述
        if (char.name === '鲁盼旋') {
            info += `<br><strong>被动技能：</strong><br>`;
            info += ` 先天能力者：未使用技能时，回合末回复200算力<br>`;
            info += ` 惩恶：友方受伤时，伤害来源获得1层【恶】<br>`;
            info += ` 愤怒之火燃起：回合末获得场上【恶】总层数的【愤怒】<br>`;
            info += `                          友方死亡时获得3层【愤怒】（上限5层）<br>`;
            info += `                          技能命中后施加分配硬币数级【燃烧】<br>`;
        }
        skillDetailDiv.innerHTML = info;
        skillDetailDiv.classList.add('active');
    }

    function updateTurnDisplay() { turnDisplay.textContent = `第 ${battleState.turnCount} 回合`; }

    function checkVictory() {
        if (battleState.getAlivePlayers().length === 0) {
            log('💀 我方全灭，战斗失败！');
            showResultPage('失败');
            nextRoundBtn.style.display = 'none';
            return true;
        }
        if (battleState.getAliveEnemies().length === 0) {
            log('🎉 敌方全灭，我方胜利！');
            showResultPage('胜利');
            nextRoundBtn.style.display = 'none';
            return true;
        }
        return false;
    }

    function showResultPage(result) {
        let html = `<div class="game-over" style="font-size:1.5em;margin-bottom:15px;">战斗${result}！</div>`;

        // —— 角色伤害统计表 ——
        html += `<table style="width:100%;border-collapse:collapse;background:#16213e;border-radius:8px;overflow:hidden;">
            <tr style="background:#0f3460;color:#f9ca24;">
                <th style="padding:8px;text-align:left;">角色</th>
                <th style="padding:8px;">阵营</th>
                <th style="padding:8px;">造成伤害</th>
                <th style="padding:8px;">受到伤害</th>
                <th style="padding:8px;">状态</th>
            </tr>`;
        const sorted = [...battleState.allCharacters].sort((a,b) => {
            if (a.team !== b.team) return a.team === 'player' ? -1 : 1;
            return a.order - b.order;
        });
        sorted.forEach(c => {
            const teamColor = c.team === 'player' ? '#2ecc71' : '#e74c3c';
            const status = c.alive ? '存活' : '阵亡';
            const statusColor = c.alive ? '#2ecc71' : '#e74c3c';
            html += `<tr style="border-top:1px solid #333;">
                <td style="padding:8px;text-align:left;font-weight:bold;">${c.name}</td>
                <td style="padding:8px;color:${teamColor};">${c.team === 'player' ? '我方' : '敌方'}</td>
                <td style="padding:8px;color:#ff6b6b;">${c.damageDealt}</td>
                <td style="padding:8px;color:#ffa502;">${c.damageReceived}</td>
                <td style="padding:8px;color:${statusColor};">${status}</td>
            </tr>`;
        });
        html += `</table>`;

        // —— Dot伤害独立区域 ——
        html += `<div style="margin-top:12px;background:#16213e;border-radius:8px;overflow:hidden;">
            <div style="padding:8px 12px;background:#0f3460;color:#e056fd;font-weight:bold;">🔥 Dot伤害明细</div>
            <table style="width:100%;border-collapse:collapse;">`;
        const dotTypes = ['burn'];
        const dotLabels = { 'burn': '【燃烧】' };
        const dotRows = [];
        sorted.forEach(c => {
            const dotMap = c.dotDamageMap || {};
            dotTypes.forEach(type => {
                const dmg = dotMap[type] || 0;
                if (dmg > 0) {
                    dotRows.push({ name: c.name, teamColor: c.team === 'player' ? '#2ecc71' : '#e74c3c', label: dotLabels[type], dmg });
                }
            });
        });
        if (dotRows.length === 0) {
            html += `<tr><td style="padding:10px;text-align:center;color:#666;">本场战斗无Dot伤害</td></tr>`;
        } else {
            html += `<tr style="background:#0f3460;color:#aaa;">
                <th style="padding:6px 10px;text-align:left;">角色</th>
                <th style="padding:6px 10px;">类型</th>
                <th style="padding:6px 10px;">伤害</th>
            </tr>`;
            dotRows.forEach(r => {
                html += `<tr style="border-top:1px solid #333;">
                    <td style="padding:6px 10px;color:${r.teamColor};">${r.name}</td>
                    <td style="padding:6px 10px;color:#e056fd;">${r.label}</td>
                    <td style="padding:6px 10px;color:#ff6b6b;">${r.dmg}</td>
                </tr>`;
            });
        }
        html += `</table></div>`;

        // —— 战斗日志（可折叠） ——
        html += `<div style="margin-top:12px;background:#0a0a1a;border-radius:8px;overflow:hidden;">
            <div id="logToggleBtn" style="padding:8px 12px;background:#0f3460;cursor:pointer;color:#f9ca24;font-weight:bold;user-select:none;"
                 onclick="toggleBattleLog()">
                📋 查看战斗日志 (${battleLog.length}条) ▸
            </div>
            <div id="battleLogContent" style="display:none;max-height:300px;overflow-y:auto;padding:8px;font-size:0.78em;color:#ccc;line-height:1.6;">
                ${battleLog.map(msg => `<p style="margin:1px 0;">${msg}</p>`).join('')}
            </div>
        </div>`;

        document.getElementById('resultContent').innerHTML = html;
        showPage('pageResult');
    }

    function toggleBattleLog() {
        const content = document.getElementById('battleLogContent');
        const btn = document.getElementById('logToggleBtn');
        if (content.style.display === 'none') {
            content.style.display = 'block';
            btn.textContent = `📋 收起战斗日志 ▾`;
        } else {
            content.style.display = 'none';
            btn.textContent = `📋 查看战斗日志 (${battleLog.length}条) ▸`;
        }
    }

    function restartBattle() {
        const level = battleState.currentLevel;
        battleState.reset();
        if (level === -1) {
            initEnemySelection();
            startCustomBattle();
        } else {
            startBattle(level);
        }
    }

    function backToTitle() {
        battleState.reset();
        initCharSelection();
        showPage('pageTitle');
    }

    // ==================== 回合流程 ====================
    function startNewRound() {
        battleState.turnCount++;
        updateTurnDisplay();
        log(`══════ 第 ${battleState.turnCount} 回合 ══════`);
        log(`我方存活：${battleState.getAlivePlayers().length}　敌方存活：${battleState.getAliveEnemies().length}`);
        battleState.allCharacters.forEach(c => c.regenSP());

        const alive = battleState.allCharacters.filter(c => c.alive);
        alive.sort((a, b) => {
            if (b.speed !== a.speed) return b.speed - a.speed;
            if (a.team === 'player' && b.team === 'enemy') return -1;
            if (a.team === 'enemy' && b.team === 'player') return 1;
            return a.position - b.position;
        });
        battleState.actionQueue = [...alive];
        log(`行动顺序: ${battleState.actionQueue.map(c => c.name+'('+c.team[0]+c.position+')').join(' → ')}`);
        nextRoundBtn.style.display = 'none';
        processNextAction();
    }

    function processNextAction() {
        if (checkVictory()) return;
        if (battleState.actionQueue.length === 0) {
            onTurnEnd();
            nextRoundBtn.style.display = 'block';
            actionContent.innerHTML = '回合结束，点击按钮继续';
            return;
        }
        battleState.currentActor = battleState.actionQueue.shift();
        if (!battleState.currentActor.alive) { processNextAction(); return; }
        renderCharacters();
        if (battleState.currentActor.team === 'player') playerTurn(battleState.currentActor);
        else enemyTurn(battleState.currentActor);
    }

    // ==================== 回合结束 ====================
    function onTurnEnd() {
        // —— 时点广播：onTurnEnd ——
        Character.invokePassives('onTurnEnd', battleState, log);

        // —— 燃烧扣血 ———
        battleState.allCharacters.forEach(c => {
            if (!c.alive) return;
            const burnLevel = c.getBuffLevel('burn');
            const burnStack = c.getBuffStack('burn');
            if (burnStack > 0 && burnLevel > 0) {
                const burnDmg = burnLevel * 50;
                const actual = c.takeTrueDamage(burnDmg);
                c.dotDamageMap['burn'] = (c.dotDamageMap['burn'] || 0) + actual;
                log(`🔥 ${c.name} 受到${burnDmg}点燃烧伤害（Lv${burnLevel}×${burnStack}层），实际${actual} (HP:${c.hp})`);
                c.reduceBuffStack('burn', 1);
                if (c.getBuffStack('burn') <= 0) c.clearBuff('burn');
                if (!c.alive) {
                    log(`💥 ${c.name} 被烧死！`);
                    Character.invokePassives('onAllyDeath', battleState, c, log);
                }
            }
        });

        renderCharacters();
    }

    // ==================== 玩家回合 ====================
    function playerTurn(actor) {
        const canAnySkillHit = actor.skills.some(skill => {
            return battleState.getAliveEnemies().some(enemy =>
                Math.abs(actor.position - enemy.position) <= skill.attackRange
            );
        });

        if (!canAnySkillHit) {
            log(`${actor.name}(位置${actor.position}) 所有技能均无法攻击到目标，自动跳过`);
            actor.actedThisTurn = false;
            battleState.currentActor = null;
            battleState.selectedSkill = null;
            renderCharacters();
            setTimeout(() => processNextAction(), 500);
            return;
        }

        battleState.waitingForPlayer = true;
        battleState.selectedSkill = null;
        skillDetailDiv.classList.remove('active');
        resetActionUI();
        drawPlayerActions(actor);
    }

    function resetActionUI() {
        const oldConfirm = document.getElementById('confirmTargetBtn');
        if (oldConfirm) oldConfirm.remove();
        const oldCancel = document.getElementById('cancelTargetBtn');
        if (oldCancel) oldCancel.remove();
    }

    function drawPlayerActions(actor) {
        const skills = actor.skills;
        let html = `<p><strong>${actor.name}(位置${actor.position})</strong> 的回合，选择技能：</p><div class="skill-buttons">`;
        skills.forEach((skill, index) => {
            const disabled = actor.sp < skill.spCost ? 'disabled' : '';
            html += `<button class="skill-btn" data-skill-index="${index}" ${disabled}>
                ${skill.name} (${skill.spCost}算力)
            </button>`;
        });
        html += `</div>`;
        html += `<div style="margin-top:10px;"><button class="skill-btn" id="skipTurnBtn" style="background:#555;">⏭ 跳过本回合</button></div>`;
        html += `<div class="target-hint" id="targetHint"></div>`;
        actionContent.innerHTML = html;

        document.querySelectorAll('.skill-btn[data-skill-index]').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const index = parseInt(e.target.dataset.skillIndex);
                selectPlayerSkill(actor, index);
            });
        });

        const skipBtn = document.getElementById('skipTurnBtn');
        if (skipBtn) {
            skipBtn.addEventListener('click', () => {
                log(`${actor.name} 跳过本回合`);
                actor.actedThisTurn = false;
                battleState.currentActor = null;
                battleState.selectedSkill = null;
                skillDetailDiv.classList.remove('active');
                resetActionUI();
                renderCharacters();
                processNextAction();
            });
        }
    }

    function selectPlayerSkill(actor, skillIndex) {
        const skill = actor.skills[skillIndex];
        if (actor.sp < skill.spCost) { log('算力不足！'); return; }
        battleState.selectedSkill = skill;
        resetActionUI();
        skillDetailDiv.classList.add('active');
        skillDetailDiv.innerHTML = `
            <strong>${skill.name}</strong><br>
            消耗算力：${skill.spCost}　攻击距离：${skill.attackRange}<br>
            伤害公式：${skill.baseDamage} + ${skill.bonusDamage} × 硬币(${skill.coinCount})<br>
            ${skill.buff ? `<span style="color:#f9ca24">效果：防御${skill.buff.value>0?'+':''}${skill.buff.value}（持续至下一次受击）</span>` : ''}
            ${skill.special && skill.special.type==='burn' ? `<span style="color:#f9ca24">命中：施加${skill.special.stacks}层【燃烧】</span>` : ''}
            ${skill.special && skill.special.type==='ignoreDef' ? `<span style="color:#f9ca24">特效：无视${skill.special.value}防御</span>` : ''}
            ${skill.special && skill.special.type==='evilDrain' ? `<span style="color:#f9ca24">特效：目标每层【恶】+${skill.special.bonus}伤害，清零【恶】</span>` : ''}
        `;
        const targetHint = document.getElementById('targetHint');
        const enemiesInRange = battleState.getAliveEnemies().filter(e => 
            Math.abs(actor.position - e.position) <= skill.attackRange
        );
        if (enemiesInRange.length === 0) {
            targetHint.textContent = '该技能范围内无可用目标！请重新选择技能。';
            battleState.selectedSkill = null;
            skillDetailDiv.classList.remove('active');
            return;
        }
        targetHint.textContent = '请点击攻击范围内的敌方角色（可多选），再按确认或取消。';
        const allCards = allCharsDiv.querySelectorAll('.character-card');
        battleState.currentSelectedTargets = new Set();
        allCards.forEach(card => {
            const charId = parseInt(card.dataset.characterId);
            const char = battleState.findCharacterById(charId);
            if (!char || char.team !== 'enemy' || !char.alive) {
                card.classList.remove('selectable');
                return;
            }
            if (enemiesInRange.includes(char)) {
                card.classList.add('selectable');
                card.style.borderColor = '#e74c3c';
            } else {
                card.classList.remove('selectable');
            }
        });
        const btnContainer = document.createElement('div');
        btnContainer.className = 'action-controls';
        btnContainer.id = 'targetBtnContainer';
        const confirmBtn = document.createElement('button');
        confirmBtn.id = 'confirmTargetBtn';
        confirmBtn.textContent = '✅ 确认';
        confirmBtn.style.cssText = 'background:#2ecc71; color:white; padding:8px 16px; border:none; border-radius:20px; cursor:pointer;';
        confirmBtn.onclick = () => {
            if (battleState.currentSelectedTargets.size === 0) { alert('请至少选择一个目标'); return; }
            const selectedTargets = Array.from(battleState.currentSelectedTargets);
            cleanupTargetSelection(allCards);
            resetActionUI();
            skillDetailDiv.classList.remove('active');
            executePlayerAction(actor, selectedTargets);
        };
        const cancelBtn = document.createElement('button');
        cancelBtn.id = 'cancelTargetBtn';
        cancelBtn.textContent = '❌ 取消';
        cancelBtn.style.cssText = 'background:#e94560; color:white; padding:8px 16px; border:none; border-radius:20px; cursor:pointer;';
        cancelBtn.onclick = () => {
            cleanupTargetSelection(allCards);
            resetActionUI();
            skillDetailDiv.classList.remove('active');
            battleState.selectedSkill = null;
            targetHint.textContent = '';
            drawPlayerActions(actor);
        };
        btnContainer.appendChild(confirmBtn);
        btnContainer.appendChild(cancelBtn);
        actionContent.appendChild(btnContainer);
    }

    function cleanupTargetSelection(allCards) {
        allCards.forEach(card => {
            card.classList.remove('selectable');
            card.style.borderColor = '';
        });
        battleState.currentSelectedTargets.clear();
    }

    function executePlayerAction(actor, targets) {
        battleState.waitingForPlayer = false;
        SkillSystem.executeSkill(actor, battleState.selectedSkill, targets, battleState, allCharsDiv, log);
        battleState.currentActor = null;
        battleState.selectedSkill = null;
        renderCharacters();
        processNextAction();
    }

    // ==================== 敌方 AI ====================
    function enemyTurn(actor) {
        actionContent.innerHTML = '<p style="color:#aaa;">敌方行动中...</p>';
        const availableSkills = actor.skills.filter(s => actor.sp >= s.spCost);
        if (availableSkills.length === 0) {
            log(`${actor.name} 算力不足，跳过`);
            setTimeout(() => { battleState.currentActor = null; renderCharacters(); processNextAction(); }, 900);
            return;
        }
        const sortedSkills = [...availableSkills].sort((a,b) => b.spCost - a.spCost);
        let chosenSkill = null;
        let targets = [];
        for (let sk of sortedSkills) {
            const candidates = battleState.getAlivePlayers().filter(p => 
                Math.abs(actor.position - p.position) <= sk.attackRange
            );
            if (candidates.length > 0) {
                chosenSkill = sk;
                targets = candidates;
                break;
            }
        }
        if (!chosenSkill) {
            log(`${actor.name} 没有可攻击目标，跳过`);
            setTimeout(() => { battleState.currentActor = null; renderCharacters(); processNextAction(); }, 900);
            return;
        }
        log(`${actor.name} 使用 ${chosenSkill.name}，目标：${targets.map(t=>t.name+'('+t.position+')').join(', ')}`);
        setTimeout(() => {
            SkillSystem.executeSkill(actor, chosenSkill, targets, battleState, allCharsDiv, log);
            battleState.currentActor = null;
            renderCharacters();
            processNextAction();
        }, 900);
    }

    // ==================== 开始战斗 ====================
    function startBattle(level) {
        battleLog = [];
        battleState.reset();
        battleState.currentLevel = level;
        globalId = 0;
        const playerChars = [];
        let pos = 0;
        selectedSlots.forEach((role) => {
            if (role !== null) {
                const char = createRoleInstance(role, 'player', pos);
                if (char) { char.order = pos; playerChars.push(char); pos++; }
            }
        });
        playerChars.sort((a,b) => a.order - b.order);
        playerChars.forEach((c, i) => { c.position = i; c.order = i; });

        let enemyChars = [];
        if (level === 0) {
            // 关卡0：测试场
            enemyChars = [
                createRoleInstance('纸糊稻草人', 'enemy', playerChars.length),
                createRoleInstance('铁皮稻草人', 'enemy', playerChars.length + 1),
                createRoleInstance('标准稻草人', 'enemy', playerChars.length + 2)
            ];
        } else {
            // 关卡1：三个警察
            enemyChars = [
                createPolice('enemy', playerChars.length, 0),
                createStickPolice('enemy', playerChars.length + 1, 100),
                createGunPolice('enemy', playerChars.length + 2, 200)
            ];
        }
        enemyChars.forEach((c, i) => { c.order = i + playerChars.length; });

        battleState.playerTeam.push(...playerChars);
        battleState.enemyTeam.push(...enemyChars);
        battleState.allCharacters.push(...playerChars, ...enemyChars);

        repositionAll();
        renderCharacters();
        updateTurnDisplay();
        logPanel.innerHTML = '<p>战斗开始！</p>';
        actionContent.innerHTML = '点击按钮开始第一回合';
        nextRoundBtn.style.display = 'block';
        nextRoundBtn.onclick = startNewRound;
        showPage('pageBattle');
    }

    // ==================== 自选敌人战斗 ====================
    function startCustomBattle() {
        const enemyCount = enemySlots.filter(r => r !== null).length;
        if (enemyCount === 0) { alert('请至少选择一个敌人！'); return; }
        const playerCount = selectedSlots.filter(r => r !== null).length;
        if (playerCount === 0) { alert('请先在选角界面选择出战角色！'); return; }

        battleLog = [];
        battleState.reset();
        battleState.currentLevel = -1;
        globalId = 0;

        const playerChars = [];
        let pos = 0;
        selectedSlots.forEach((role) => {
            if (role !== null) {
                const char = createRoleInstance(role, 'player', pos);
                if (char) { char.order = pos; playerChars.push(char); pos++; }
            }
        });
        playerChars.sort((a,b) => a.order - b.order);
        playerChars.forEach((c, i) => { c.position = i; c.order = i; });

        const enemyChars = [];
        let eIdx = 0;
        enemySlots.forEach((role) => {
            if (role !== null) {
                const char = createRoleInstance(role, 'enemy', playerChars.length + eIdx);
                if (char) { char.order = playerChars.length + eIdx; enemyChars.push(char); eIdx++; }
            }
        });

        battleState.playerTeam.push(...playerChars);
        battleState.enemyTeam.push(...enemyChars);
        battleState.allCharacters.push(...playerChars, ...enemyChars);

        repositionAll();
        renderCharacters();
        updateTurnDisplay();
        logPanel.innerHTML = '<p>⚔️ 自定义测试战斗开始！</p>';
        actionContent.innerHTML = '点击按钮开始第一回合';
        nextRoundBtn.style.display = 'block';
        nextRoundBtn.onclick = startNewRound;
        showPage('pageBattle');
    }

    initCharSelection();
    // ==================== 自选敌人界面 ====================
    const AVAILABLE_ENEMIES = ['纸糊稻草人', '铁皮稻草人', '标准稻草人', '灵敏稻草人', '再生稻草人'];
    let enemySlots = [];
    let pendingEnemyIndex = -1;

    function initEnemySelection() {
        enemySlots = [null, null, null];
        pendingEnemyIndex = -1;
        renderEnemySlots();
        renderEnemyRoster();
    }

    function clickEnemySlot(index) {
        if (enemySlots[index] !== null) {
            enemySlots[index] = null;
            pendingEnemyIndex = -1;
        } else {
            pendingEnemyIndex = index;
        }
        renderEnemySlots();
        renderEnemyRoster();
    }

    function selectRosterEnemy(roleName) {
        if (pendingEnemyIndex === -1) {
            const emptyIdx = enemySlots.indexOf(null);
            if (emptyIdx === -1) { alert('敌方阵容已满！'); return; }
            enemySlots[emptyIdx] = roleName;
        } else {
            enemySlots[pendingEnemyIndex] = roleName;
            pendingEnemyIndex = -1;
        }
        renderEnemySlots();
        renderEnemyRoster();
    }

    function renderEnemySlots() {
        const container = document.getElementById('enemySlots');
        container.innerHTML = '';
        enemySlots.forEach((role, idx) => {
            const div = document.createElement('div');
            div.className = 'char-slot';
            if (role === null) {
                div.style.borderColor = idx === pendingEnemyIndex ? '#f9ca24' : '#555';
                if (idx === pendingEnemyIndex) div.style.boxShadow = '0 0 10px #f9ca24';
                div.innerHTML = `<div class="name">空位</div><div class="desc">点击选敌</div>`;
            } else {
                div.style.borderColor = '#e74c3c';
                div.innerHTML = `<div class="name">${role}</div><div class="desc">站位${idx+1}</div>`;
            }
            div.onclick = () => clickEnemySlot(idx);
            container.appendChild(div);
        });
    }

    function renderEnemyRoster() {
        const container = document.getElementById('enemyRoster');
        container.innerHTML = '';
        AVAILABLE_ENEMIES.forEach(roleName => {
            const div = document.createElement('div');
            div.className = 'roster-card';
            const count = enemySlots.filter(r => r === roleName).length;
            div.innerHTML = `
                <div class="name">${roleName}</div>
                <div class="desc">${count > 0 ? `已选×${count}` : '点击上阵'}</div>
            `;
            div.onclick = () => selectRosterEnemy(roleName);
            container.appendChild(div);
        });
    }
</script>
</body>
</html>
