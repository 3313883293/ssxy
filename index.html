<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>某科学的书生学院</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <div id="pageTitle" class="page active">
        <h1>某科学的书生学院</h1>
        <div class="sub">回合制策略对决</div>
        <button class="btn-main" onclick="showPage('pageSelectChar')">开始游戏</button>
    </div>

    <div id="pageSelectChar" class="page">
        <h2>选择出战角色与站位</h2>
        <p style="color:#aaa;">先点空格标记位置，或先点角色再点空格填充</p>
        <div class="char-slots" id="charSlots"></div>
        <div class="char-roster" id="charRoster"></div>
        <div id="roleDetailPanel" class="role-detail" style="display:none;">
            <div class="role-detail-header" id="roleDetailHeader"></div>
            <div class="role-detail-body" id="roleDetailBody"></div>
        </div>
        <div class="control-buttons">
            <button class="btn-main" onclick="startLevelSelect()">确认出战</button>
            <button class="btn-main" style="background:#555;" onclick="showPage('pageTitle')">返回</button>
        </div>
    </div>

    <div id="pageLevel" class="page">
        <h2>选择关卡</h2>
        <div class="level-card" onclick="startBattle(0)">
            <h3>关卡0 · 测试场</h3>
            <div class="enemy-preview">敌方配置：纸糊稻草人×1 铁皮稻草人×1 标准稻草人×1</div>
        </div>
        <div class="level-card" onclick="startBattle(1)" style="margin-top:12px;">
            <h3>第一关</h3>
            <div class="enemy-preview">敌方配置：持盾警察×1 持棍警察×1 持枪警察×1</div>
        </div>
        <div class="level-card" onclick="showPage('pageSelectEnemy'); initEnemySelection();" style="margin-top:12px; border-color:#f9ca24;">
            <h3 style="color:#f9ca24;">🎯 自选敌人测试</h3>
            <div class="enemy-preview">自由搭配稻草人阵容，测试技能效果</div>
        </div>
        <button class="btn-main" style="background:#555; margin-top:15px;" onclick="showPage('pageSelectChar')">返回</button>
    </div>

    <div id="pageSelectEnemy" class="page">
        <h2>自选敌人 — 选择敌方阵容</h2>
        <p style="color:#aaa;">点击空格选敌，点击已选角色移除</p>
        <div class="char-slots" id="enemySlots"></div>
        <div class="char-roster" id="enemyRoster"></div>
        <div class="control-buttons">
            <button class="btn-main" onclick="startCustomBattle()">⚔️ 开始战斗</button>
            <button class="btn-main" style="background:#555;" onclick="showPage('pageLevel')">返回</button>
        </div>
    </div>

    <div id="pageBattle" class="page">
        <div class="battle-header">
            <h2>⚔️ 战斗</h2>
            <div class="win-condition">🏆 胜利条件：击败敌方全部角色</div>
            <div class="turn-info" id="turnDisplay">第 1 回合</div>
        </div>
        <div class="arena">
            <div class="all-characters" id="allChars"></div>
        </div>
        <div class="bottom-panel">
            <div class="skill-detail" id="skillDetail"></div>
            <div id="actionContent">等待开始...</div>
            <div class="log" id="logPanel"><p>战斗开始！</p></div>
            <button class="next-btn" id="nextRoundBtn" style="display:none;">▶ 开始回合</button>
        </div>
        <div id="buffPopupOverlay" class="buff-popup-overlay" style="display:none;" onclick="closeBuffPopup()">
            <div class="buff-popup" onclick="event.stopPropagation()">
                <div class="buff-popup-header">
                    <span id="buffPopupTitle">Buff 详情</span>
                    <span class="buff-popup-close" onclick="closeBuffPopup()">✕</span>
                </div>
                <div id="buffPopupBody" class="buff-popup-body"></div>
            </div>
        </div>
    </div>

    <div id="pageResult" class="page">
        <h2 style="color:#f9ca24;">📊 战斗结算</h2>
        <div id="resultContent" style="width:100%;"></div>
        <div class="control-buttons" style="margin-top:15px;">
            <button class="btn-main" onclick="backToTitle()">返回主界面</button>
            <button class="btn-main" onclick="restartBattle()" style="background:#3498db;">🔄 再来一局</button>
        </div>
    </div>
</div>

<script src="js/Skills.js"></script>
<script src="js/Characters.js"></script>
<script src="js/Roles.js"></script>
<script src="js/BattleState.js"></script>
<script src="js/SkillSystem.js"></script>
<script src="js/globals.js"></script>
<script src="js/ui.js"></script>
<script src="js/charSelect.js"></script>
<script src="js/enemySelect.js"></script>
<script src="js/battleUI.js"></script>
<script src="js/battleActions.js"></script>
<script src="js/battleFlow.js"></script>
</body>
</html>
